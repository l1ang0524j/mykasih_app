name: bmi_final
description: "A MyKasih app for SARA assistance"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.0.0

  # 本地化支持
  flutter_localizations:
    sdk: flutter

  # 核心依赖 - 升级 intl 到 0.20.2
  intl: ^0.20.2
  provider: ^6.1.1
  shared_preferences: ^2.2.0
  # webfeed: ^0.7.0  # 已移除，使用自定义 RSS 解析

  # 数据库
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # 地图
  google_maps_flutter: ^2.5.0
  location: ^5.0.3

  # 相机
  camera: ^0.10.5

  # AI
  google_generative_ai: ^0.2.0

  # 网络
  http: ^1.1.0
  xml: ^6.3.0
  url_launcher: ^6.2.4

  # 时间
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/